; ─── Global settings ──────────────────────────────────
[global]
type=global
; Reject requests that don't match any endpoint
unidentified_request_period=2
unidentified_request_count=3
unidentified_request_prune_interval=30

; ─── ACL — only allow your VPS + local Docker network ─
[acl]
type=acl
deny=0.0.0.0/0.0.0.0
permit=209.38.223.4/255.255.255.255
permit=172.16.0.0/255.240.0.0
permit=192.168.0.0/255.255.0.0
permit=10.0.0.0/255.0.0.0
permit=127.0.0.1/255.255.255.255

; ─── Transport ────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; ─── Endpoint 6001 ───────────────────────────────────
[6001]
type=endpoint
transport=transport-udp
context=stratix-in
disallow=all
allow=opus,ulaw,alaw
auth=auth6001
aors=aor6001
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
direct_media=no
acl=acl

[auth6001]
type=auth
auth_type=userpass
username=6001
password=Str4t1x_6001!

[aor6001]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30

