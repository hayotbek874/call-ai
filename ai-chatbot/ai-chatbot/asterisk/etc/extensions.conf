[general]

[globals]

; ─── Reject context — silently drop unmatched/scanner traffic ─
[default]
exten => _X.,1,Hangup()
exten => _[a-z].,1,Hangup()

[stratix-in]
; Route incoming calls to the AI voice pipeline via AudioSocket.
; The phone number is embedded in the UUID (last 12 hex chars)
; so the Python server can extract it.  Format:
;   00000000-0000-0000-0000-<phone padded to 12 digits>
exten => _X.,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Set(PH=000000000000${CALLERID(num)})
 same => n,AudioSocket(00000000-0000-0000-0000-${PH:-12},209.38.223.4:9099)
 same => n,Hangup()


[voicebot-ai]
exten => s,1,NoOp(ARI handoff to AudioSocket for ${CALLERID(num)})
 same => n,Set(PH=000000000000${CALLERID(num)})
 same => n,AudioSocket(00000000-0000-0000-0000-${PH:-12},209.38.223.4:9099)
 same => n,Hangup()

[from-internal]
exten => _X.,1,Dial(PJSIP/${EXTEN})
 same => n,Hangup()